<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050507">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zev</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sticky Header Panel -->
        <header class="panel-header">
            <div class="app-identity">ZEV // SYSTEM</div>
            <button id="install-btn" class="install-trigger">INSTALL.EXE</button>
        </header>

        <div class="scroll-container">
            <!-- Stats Panel -->
            <section class="panel stats-panel">
                <div class="stat-unit">
                    <span class="stat-label">Level</span>
                    <span class="stat-value" id="level-display">1</span>
                </div>
                <div class="stat-unit" style="text-align: right;">
                    <span class="stat-label">Streak</span>
                    <span class="stat-value" id="streak-display">0</span>
                </div>
                <div class="progress-track-engineered">
                    <div class="progress-fill-engineered" id="progress-bar"></div>
                </div>
            </section>

            <!-- Grid Panel -->
            <section class="panel">
                <div class="section-meta">
                    <span>30-DAY COMPLIANCE</span>
                    <span><span id="xp-current">0</span> / <span id="xp-target">100</span> XP</span>
                </div>
                <div class="grid-modular" id="progress-grid">
                    <!-- Grid items generated by JS -->
                </div>
            </section>

            <!-- Log Panel -->
            <section class="panel log-panel">
                <div class="section-meta">
                    <span>TODAY'S ACTIVITY</span>
                </div>
                <div id="log-list">
                    <!-- Log items generated by JS -->
                </div>
            </section>
        </div>
    </div>

    <!-- Engineered Dock UI -->
    <form class="dock-ui" id="action-form">
        <div class="dock-input-group">
            <input type="text" id="action-name" placeholder="Execute action..." required autocomplete="off">
        </div>
        <div class="stepper-ui">
            <button type="button" id="step-down">−</button>
            <input type="number" id="action-points" value="2" min="1" max="2" required readonly>
            <button type="button" id="step-up">+</button>
        </div>
        <button type="submit" class="submit-engine" id="submit-btn">↵</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
